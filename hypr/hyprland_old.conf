## Startup ##
exec-once = waybar
exec-once = awww-daemon
exec-once = hyprcursor
exec-once = hypridle
exec-once = mako

## Wallpaper ##
exec = awww img /home/voxelfied/Pictures/Wallpapers/rain.jpg

### Essential ###

# Mod Key
$mod = alt
# Terminal Emulator
$terminal = kitty -1
# File Manager
$fileManager = pcmanfm
# Application Launcher
$menu = wofi --show
# Logout Menu
$logoutMenu = wlogout
# Editor
$editor = code
# Browser
$browser = firefox-developer-edition

### Visual ###

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgb(A7C080)
    col.inactive_border = rgb(3D484D)
    resize_on_border = true
    allow_tearing = false
    layout = hy3
}

decoration {
    rounding = 8
    active_opacity = 1.0
    inactive_opacity = 1.0
    shadow {
        enabled = false
    }
    blur {
        enabled = true
        size = 4
        passes = 2
        vibrancy = 0
    }
}

animations {
    enabled = true
    bezier = overshot, 0.13, 0.99, 0.29, 1.1
    animation = windows, 1, 7, overshot, slide
    animation = windowsIn, 1, 7, overshot, slide
    animation = windowsOut, 1, 7, overshot, slide
    animation = windowsMove, 1, 7, overshot, slide
    animation = border, 1, 10, default
    animation = fade, 1, 7, overshot,
    animation = workspaces, 1, 6, default
}

master {
    new_status = master
}

misc {
    animate_manual_resizes = true
    force_default_wallpaper = 0
    disable_splash_rendering = true
    disable_hyprland_logo = true
}

ecosystem {
    no_update_news = true
    no_donation_nag = true
    enforce_permissions = false
}

## GTK Theme ##
$gnome-schema = org.gnome.desktop.interface
exec-once = gsettings set $gnome-schema gtk-theme 'Everforest-Dark'
exec-once = gsettings set $gnome-schema icon-theme 'Everforest-Dark'
exec-once = gsettings set $gnome-schema cursor-theme 'Bibata-Modern-Classic 16'
exec-once = gsettings set $gnome-schema font-name 'Clear Sans 10'
exec-once = gsettings set org.gnome.desktop.wm.preferences button-layout :

### Key Bindings ###

# Start Terminal Emulator
bind = $mod, Backslash, exec, $terminal
bind = Control, Space, exec, $terminal
# Kill Focused Window
bind = $mod, Q, killactive,
bind = $mod Shift, Q, exec, hyprctl kill
# Start File Manager
bind = $mod, I, exec, $fileManager
# Start Application Launcher
bind = $mod, D, exec, $menu
# Start Logout Menu
bind = Super, E, exec, $logoutMenu
# Start Editor
bind = $mod, E, exec, $editor
#Start Browser
bind = $mod, G, exec, $browser
# Exit Hyprland
bind = $mod Shift, E, exit,

### Actions ###

# Capture Specific Area
bind = $mod Shift, P, exec, grim -g "$(slurp)" - | tee ~/Pictures/Screenshots/Screenshot_$(date '+%m-%d-%Y_%H-%M-%S').jpg | wl-copy
bind = $mod Control, BracketLeft, exec, gpu-screen-recorder -w screen -o ~/Pictures/Videos/Recording_$(date '+%m-%d-%Y_%H-%M-%S').mp4 & notify-send -u low -t 1000 "Screen Capture" "Recording started." -i /usr/share/icons/camera.png
bind = $mod Control, BracketRight, exec, killall -SIGINT gpu-screen-recorder && notify-send -u low "Screen Capture" "Recording stopped." -i /usr/share/icons/camera-off.png
bind = $mod Control, Backslash, exec, killall -SIGUSR2 gpu-screen-recorder
# Reload Waybar
bind = $mod Shift, C, exec, killall waybar || true && waybar &

### Navigation ###

# Directions
$left = h
$right = l
$up = k
$down = j
# Focus Window
bind = $mod, $left, movefocus, l
bind = $mod, $right, movefocus, r
bind = $mod, $up, movefocus, u
bind = $mod, $down, movefocus, d
bind = $mod, Left, movefocus, l
bind = $mod, Right, movefocus, r
bind = $mod, Up, movefocus, u
bind = $mod, Down, movefocus, d
# Move Focused Window
bind = $mod Shift, $left, movewindow, l
bind = $mod Shift, $right, movewindow, r
bind = $mod Shift, $up, movewindow, u
bind = $mod Shift, $down, movewindow, d
bind = $mod Shift, Left, movewindow, l
bind = $mod Shift, Right, movewindow, r
bind = $mod Shift, Up, movewindow, u
bind = $mod Shift, Down, movewindow, d

### Display ###

# Display Setup
monitor = eDP-1,2560x1440@60, auto, 1.6
# monitor = eDP-1, disable
monitor = desc:Acer Technologies KA242Y E D31315FA63W01, 1920x1080@100, auto, 1
monitor = desc:Samsung Electric Company C27F398 H1AK500000, 1920x1080@60, auto, 1
# Switch Focus Between Monitors
bind = $mod, Tab, focusmonitor, +1
bind = $mod SHIFT, Tab, focusmonitor, -1

### Input ###

input {
    kb_layout = us
    kb_options = caps:ctrl_modifier
    repeat_delay = 300
    repeat_rate = 35
    follow_mouse = 1
    # accel_profile = adaptive
    force_no_accel = true
    sensitivity = 0.2
    touchpad {
        natural_scroll = false
        scroll_factor = 0.2
        middle_button_emulation = true
        tap-to-click = true
        tap-and-drag = false
        clickfinger_behavior = true
        drag_lock = false
    }
}

gestures {
    workspace_swipe_distance = 2000
    workspace_swipe_min_speed_to_force = 10
    workspace_swipe_use_r = true
}

device {
    name = 1133:49291:Logitech_G502_HERO_Gaming_Mouse
    natural_scroll = false
    # accel_profile = flat
    sensitivity = -0.3
}

cursor {
    no_hardware_cursors = true
}

## Media Keys ##
bindle = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%+
bindle = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
#bindle = , XF86MonBrightnessUp, exec,
#bindle = , XF86MonBrightnessDown, exec,
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , End, exec, playerctl play-pause
bindl = , Insert, exec, playerctl next
bindl = , Home, exec, playerctl previous

### Workspaces ###

# Switch to Workspace
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10
# Move Focused Window to Workspace
bind = $mod Shift, 1, movetoworkspacesilent, 1
bind = $mod Shift, 2, movetoworkspacesilent, 2
bind = $mod Shift, 3, movetoworkspacesilent, 3
bind = $mod Shift, 4, movetoworkspacesilent, 4
bind = $mod Shift, 5, movetoworkspacesilent, 5
bind = $mod Shift, 6, movetoworkspacesilent, 6
bind = $mod Shift, 7, movetoworkspacesilent, 7
bind = $mod Shift, 8, movetoworkspacesilent, 8
bind = $mod Shift, 9, movetoworkspacesilent, 9
bind = $mod Shift, 0, movetoworkspacesilent, 10

### Layout ###

# Move Window
bindm = $mod, mouse:272, movewindow
# Resize Window
bindm = $mod, mouse:273, resizewindow
binde = Super, $left, resizeactive, -20 0
binde = Super, $right, resizeactive, 20 0
binde = Super, $up, resizeactive, 0 -20
binde = Super, $down, resizeactive, 0 20
# Scroll Through Existing Workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1
# Toggle Fullscreen Mode
bind = $mod Control, F, fullscreen,
# Toggle Current Focus Between Tiling and Floating Mode
bind = $mod SHIFT, Space, togglefloating,
bind = $mod, P, pseudo,

### Environment Variables ###

# NVIDIA Graphics
env = AQ_ARM_DEVICES,/dev/dri/card0:/dev/dri/card1
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# Cursor
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,16
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,16

### Scratchpad ###
$scratchpad = special
bind = $mod, Minus, movetoworkspacesilent, $scratchpad
bind = $mod, Equal, togglespecialworkspace,

## Screensharing ##
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
