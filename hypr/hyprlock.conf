general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

animation {
    enabled = true
}

background {
    path = screenshot
    blur_passes = 2
}

label {
    text = cmd[update:1000] echo "<b><span>$(date +"%H:%M")</span></b>"
    color = rgba(167, 192, 128, 0.70)
    font_size = 130
    font_family = Hack Nerd Font
    position = 0, 240
    halign = center
    valign = center
}

label {
    text = cmd[update:1000] echo -e "$(date +"%A, %d %B")"
    color = rgba(167, 192, 128, 0.70)
    font_size = 30
    font_family = Hack Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

image {
    path = ~/Pictures/Profiles/vox3l.jpg
    border_size = 2
    size = 120
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 0, -80
    halign = center
    valign = center
}

label {
    text = <b>voxelfied</b>
    color = rgba(157, 169, 160, 1.00)
    font_size = 25
    font_family = Hack Nerd Font
    position = 0, -180
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(35, 42, 46, 0.4)
    font_color = rgb(211, 198, 170)
    fade_on_empty = false
    font_family = Hack Nerd Font
    placeholder_text = <b><span foreground="##D3C6AA99">Password</span></b>
    hide_input = false
    position = 0, -260
    halign = center
    valign = center
}
