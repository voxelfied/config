# Statusline Config

set -g mode-style "fg=#eee8d5,bg=#073642"

set -g message-style "fg=#eee8d5,bg=#073642"
set -g message-command-style "fg=#eee8d5,bg=#073642"

set -g status "on"
set -g status-interval 1
set -g status-justify "left"

set -g status-style "fg=#586e75,bg=#073642"

set -g status-bg "#282828"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#282828,bg=#a99884,bold] #S #[fg=#a99884,bg=#4f4944,nobold,nounderscore,noitalics]#[fg=#dcc8a4,bg=#4f4944,bold] #(whoami) #[fg=#4f4944,bg=#282828]"

# Host Status Config
set -g status-right "#[fg=#826f5a,bg=#282828,nobold,nounderscore,noitalics]#[fg=#9d8972,bg=#826f5a,nobold,nounderscore,noitalics]#[fg=#a99884,bg=#9d8972,nobold,nounderscore,noitalics]#[fg=#282828,bg=#a99884,bold] #h "

setw -g window-status-activity-style "underscore,fg=#839496,bg=#202020"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#839496,bg=#202020"

# Left Status Config
setw -g window-status-format '#[fg=#202020,bg=#202020]#[default] #I  #{b:pane_current_path} #[fg=#202020,bg=#202020,nobold,nounderscore,noitalics]'
setw -g window-status-current-format '#[fg=#282828,bg=#a99884]#[fg=#282828,bg=#a99884] #I #[fg=#a99884,bg=#4f4944] #{b:pane_current_path} #[fg=#4f4944,bg=#282828,nobold]'
