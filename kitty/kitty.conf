## Kitty ##

# Shell
shell .
shell-integration no-cursor
editor nvim
# Wayland
linux_display_server wayland
wayland_enable_ime yes

### Font ###

# Font Family
font_family      Hack Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
# Font Size
font_size 10.0

### Performance ###

# Input
repaint_delay 10
input_delay 3
# Sync Refresh Rate
sync_to_monitor yes

## Scroll ##
touch_scroll_multiplier 10.0

## Tools ##
copy_on_select yes

## Window ##
confirm_os_window_close 0
window_padding_width 4

## Cursor ##
cursor #D3C6AA
cursor_text_color #2D353B
cursor_shape_unfocused underline
cursor_underline_thickness 1.0
cursor_stop_blinking_after 0

## Terminal ##
foreground #D3C6AA
background #2D353B
background_opacity 0.8
selection_foreground none
selection_background #A7C080

### Color Palette ###

# Black
color0 #7A8478
color8 #859289
# Red
color1 #E67E80
color9 #E67E80
# Green
color2  #A7C080
color10 #A7C080
# Yellow
color3  #DBBC7F
color11 #DBBC7F
# Blue
color4  #7FBBB3
color12 #7FBBB3
# Magenta
color5  #D699B6
color13 #D699B6
# Cyan
color6  #83C092
color14 #83C092
# White
color7  #D3C6AA
color15 #D3C6AA

### Key Bindings ###

# Kitty Mod
kitty_mod super
# Clear Default Shortcuts
clear_all_shortcuts yes
# Key Mappings
map alt+c copy
map alt+v paste
